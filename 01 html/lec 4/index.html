<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Inputs</title>
</head>

<body>
  <h2>Job Application Form</h2>

  <form action="#">
    <label for="fullname">Full name:</label>
    <input type="text" name="fullname" placeholder="Enter fullname" id="fullname">

    <br> <br>

    <label for="email">Email address: </label>
    <input type="email" name="email" placeholder="Enter email" id="email">

    <br><br>

    <label for="password">Password: </label>
    <input type="password" name="password" placeholder="Enter password" id="password">

    <br><br>
    
    <label for="Phone">Phone: </label>
    <input type="tel" name="phone" placeholder="Enter Phone Number" id="Phone" maxlength="10" minlength="10">

    <br><br>
    <label for="age">Age: </label>
    <input type="number" name="age" placeholder="Enter age" id="age" min="18" max="60">

    <br><br>
    <label for="dob">Date of birth: </label>
    <input type="datetime-local" name="dob" placeholder="Enter DOB" id="dob" >

    <br><br>

    <label for="image">Profile Image: </label>
    <input type="file" name="image" placeholder="Upload Profile Image" id="image" accept=".png,.jpeg" multiple>

    <br><br>
    
    <label for="gender">Gender: </label>
    <input type="radio" name="gender" id="male" value="male"> <label for="male">Male</label>
    <input type="radio" name="gender" id="female" value="female"> <label for="female">Female</label>
    <input type="radio" name="gender" id="others" value="others"> <label for="others">Others</label>

    <br><br>

    <label for="country">Country: </label>
    <select name="country" id="country">
      <option value="">Select</option>
      <option value="IN">India</option>
      <option value="US">United States</option>
    </select>

    <br> <br>

    <input type="checkbox" name="terms" id="terms"> 
    <label for="terms">I agree to terms and conditions</label>

    <br> <br> 

    <button type="reset">Submit</button>
  </form>
</body>

</html>
